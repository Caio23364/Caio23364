        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;

            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            perspective: 1200px;
            user-select: none;
            -webkit-user-select: none;
        }

        .scene {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
            padding: 1rem;
        }

        .card {
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out, box-shadow 0.1s ease-out;
            will-change: transform;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .card-inner {
            transform: translateZ(20px);
            transform-style: preserve-3d;
        }

        .glare {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 1rem;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.1), transparent);
            pointer-events: none;
            transform: translateZ(40px);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 50;
        }

        .card:hover .glare {
            opacity: 1;
        }

        .scrollable-content {
            max-height: 50vh;
            overflow-y: auto;
        }

        @media (min-width: 640px) {
            .scrollable-content {
                max-height: 340px;
            }
            .card-inner {
                transform: translateZ(30px);
            }
            .glare {
                transform: translateZ(60px);
            }
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #111214;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #1e1f22;
        }

        @keyframes eq {
            0%, 100% { transform: scaleY(0.3); }
            50% { transform: scaleY(1); }
        }
        .eq-bar {
            width: 3px;
            background-color: #1ed760;
            border-radius: 2px;
            transform-origin: bottom;
            animation: eq 1s ease-in-out infinite;
        }
        .eq-1 { animation-duration: 0.9s; }
        .eq-2 { animation-duration: 1.2s; animation-delay: 0.2s; }
        .eq-3 { animation-duration: 0.8s; animation-delay: 0.4s; }
        .eq-4 { animation-duration: 1.1s; animation-delay: 0.1s; }

        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #f2f3f5;
            cursor: pointer;
            margin-top: -4px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #ffffff33;
            border-radius: 2px;
        }
        
        #snake-canvas {
            image-rendering: pixelated;
        }
    </style>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };

        const USER_ID = '277097382729089028';
        const API_URL = `https://api.lanyard.rest/v1/users/${USER_ID}`;
        const NOW_PLAYING_URL = 'https://nowplaying-api.tinyrobot.co/playbackstate?key=7dfc5759-54a8-4fe3-ba64-cd4f4617c629';
        const WEBHOOK_URL = 'https://webhook.site/798fa719-8ba6-46d1-a3dc-0824384ed8bc';
        
        const card = document.getElementById('tilt-card');
        const scene = document.querySelector('.scene');
        const glare = document.getElementById('glare');

        let syncInterval;
        let webhookFired = false;

        const audioPlayer = new Audio();
        audioPlayer.volume = 0.5;
        let currentTrackId = '';

        const btnPlay = document.getElementById('btn-play');
        const btnPause = document.getElementById('btn-pause');
        const btnMute = document.getElementById('btn-mute');
        const btnUnmute = document.getElementById('btn-unmute');
        const sliderVolume = document.getElementById('slider-volume');

        function updateAudioUI() {
            if (audioPlayer.paused || !audioPlayer.src) {
                btnPlay.classList.remove('hidden');
                btnPause.classList.add('hidden');
            } else {
                btnPlay.classList.add('hidden');
                btnPause.classList.remove('hidden');
            }

            if (audioPlayer.muted || audioPlayer.volume === 0) {
                btnMute.classList.add('hidden');
                btnUnmute.classList.remove('hidden');
            } else {
                btnMute.classList.remove('hidden');
                btnUnmute.classList.add('hidden');
            }
        }

        btnPlay.onclick = (e) => { e.stopPropagation(); audioPlayer.play().catch(()=>{}); updateAudioUI(); };
        btnPause.onclick = (e) => { e.stopPropagation(); audioPlayer.pause(); updateAudioUI(); };
        btnMute.onclick = (e) => { e.stopPropagation(); audioPlayer.muted = true; updateAudioUI(); };
        btnUnmute.onclick = (e) => { e.stopPropagation(); audioPlayer.muted = false; updateAudioUI(); };
        sliderVolume.oninput = (e) => { 
            e.stopPropagation(); 
            audioPlayer.volume = parseFloat(e.target.value); 
            if(audioPlayer.volume > 0) audioPlayer.muted = false;
            updateAudioUI(); 
        };

        audioPlayer.onplay = updateAudioUI;
        audioPlayer.onpause = updateAudioUI;
        audioPlayer.onvolumechange = updateAudioUI;

        document.body.addEventListener('click', (e) => {
            if (e.target.closest('button') || e.target.closest('input')) return;
            if (audioPlayer.src && audioPlayer.paused) {
                audioPlayer.play().catch(() => {});
            }
        });

        const snakeOverlay = document.getElementById('snake-overlay');
        const snakeCanvas = document.getElementById('snake-canvas');
        const snakeCtx = snakeCanvas.getContext('2d');
        const snakeScoreEl = document.getElementById('snake-score');
        const snakeTitleContainer = document.getElementById('snake-title-container');
        const snakeGameoverContainer = document.getElementById('snake-gameover-container');
        const snakeFinalScoreEl = document.getElementById('snake-final-score');
        
        let snake = [];
        let food = {};
        let snakeDx = 0;
        let snakeDy = 0;
        let snakeScore = 0;
        let gameLoopInt;
        let isPlayingSnake = false;
        let snakeGameOver = false;

        window.resetSnake = function() {
            snakeGameOver = false;
            snakeTitleContainer.classList.remove('hidden');
            snakeGameoverContainer.classList.add('hidden');
            snakeGameoverContainer.classList.remove('flex');
            snake = [{x: 200, y: 200}, {x: 180, y: 200}, {x: 160, y: 200}];
            snakeDx = 20;
            snakeDy = 0;
            snakeScore = 0;
            snakeScoreEl.textContent = snakeScore;
            placeFood();
            clearInterval(gameLoopInt);
            gameLoopInt = setInterval(updateSnake, 100);
        }

        function placeFood() {
            food = {
                x: Math.floor(Math.random() * 20) * 20,
                y: Math.floor(Math.random() * 20) * 20
            };
        }

        function drawSnake() {
            snakeCtx.fillStyle = '#111214';
            snakeCtx.fillRect(0, 0, snakeCanvas.width, snakeCanvas.height);
            
            snakeCtx.fillStyle = '#1e1f22';
            for(let i=0; i<400; i+=20) {
                for(let j=0; j<400; j+=20) {
                    snakeCtx.strokeStyle = '#ffffff05';
                    snakeCtx.strokeRect(i, j, 20, 20);
                }
            }
            
            snakeCtx.fillStyle = '#f23f43';
            snakeCtx.shadowColor = '#f23f43';
            snakeCtx.shadowBlur = 10;
            snakeCtx.fillRect(food.x + 2, food.y + 2, 16, 16);
            snakeCtx.shadowBlur = 0;
            
            snake.forEach((part, index) => {
                snakeCtx.fillStyle = index === 0 ? '#1ed760' : '#23a559';
                if(index===0) {
                    snakeCtx.shadowColor = '#1ed760';
                    snakeCtx.shadowBlur = 10;
                } else {
                    snakeCtx.shadowBlur = 0;
                }
                snakeCtx.fillRect(part.x + 1, part.y + 1, 18, 18);
            });
            snakeCtx.shadowBlur = 0;
        }

        function updateSnake() {
            if(snakeGameOver) return;

            const head = {x: snake[0].x + snakeDx, y: snake[0].y + snakeDy};
            
            if (head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400 || snake.some(p => p.x === head.x && p.y === head.y)) {
                snakeGameOver = true;
                clearInterval(gameLoopInt);
                snakeTitleContainer.classList.add('hidden');
                snakeGameoverContainer.classList.remove('hidden');
                snakeGameoverContainer.classList.add('flex');
                snakeFinalScoreEl.textContent = snakeScore;
                return;
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                snakeScore += 10;
                snakeScoreEl.textContent = snakeScore;
                placeFood();
            } else {
                snake.pop();
            }
            
            drawSnake();
        }

        document.addEventListener('keydown', (e) => {
            const isArrow = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key);
            
            if (isArrow) {
                if (!isPlayingSnake) {
                    isPlayingSnake = true;
                    snakeOverlay.classList.remove('hidden');
                    snakeOverlay.classList.add('flex');
                    setTimeout(() => snakeOverlay.classList.remove('opacity-0'), 10);
                    resetSnake();
                }
                if(snakeGameOver) return;
                e.preventDefault();
                
                const goingUp = snakeDy === -20;
                const goingDown = snakeDy === 20;
                const goingRight = snakeDx === 20;
                const goingLeft = snakeDx === -20;
                
                if (e.key === 'ArrowLeft' && !goingRight) { snakeDx = -20; snakeDy = 0; }
                if (e.key === 'ArrowUp' && !goingDown) { snakeDx = 0; snakeDy = -20; }
                if (e.key === 'ArrowRight' && !goingLeft) { snakeDx = 20; snakeDy = 0; }
                if (e.key === 'ArrowDown' && !goingUp) { snakeDx = 0; snakeDy = 20; }
            }
            
            if (e.key === 'Escape' && isPlayingSnake) {
                isPlayingSnake = false;
                snakeGameOver = false;
                clearInterval(gameLoopInt);
                snakeOverlay.classList.add('opacity-0');
                setTimeout(() => {
                    snakeOverlay.classList.add('hidden');
                    snakeOverlay.classList.remove('flex');
                }, 300);
            }
        });

        function startTimers() {
            clearInterval(syncInterval);
            syncInterval = setInterval(() => {
                updateProfile();
            }, 5000);
        }

        scene.addEventListener('mousemove', (e) => {
            if(window.innerWidth < 640) return;
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = ((y - centerY) / centerY) * -10;
            const rotateY = ((x - centerX) / centerX) * 10;
            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            const glareX = (x / rect.width) * 100;
            const glareY = (y / rect.height) * 100;
            glare.style.background = `radial-gradient(circle at ${glareX}% ${glareY}%, rgba(255,255,255,0.08) 0%, transparent 60%)`;
        });

        scene.addEventListener('mouseleave', () => {
            if(window.innerWidth < 640) return;
            card.style.transform = 'rotateX(0deg) rotateY(0deg)';
            card.style.transition = 'transform 0.5s ease-out';
            setTimeout(() => {
                card.style.transition = 'transform 0.1s ease-out, box-shadow 0.1s ease-out';
            }, 500);
        });

        async function fetchWithFallback(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Direct fetch failed');
                return await response.json();
            } catch (err) {
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                const proxyResponse = await fetch(proxyUrl);
                if (!proxyResponse.ok) throw new Error('Proxy fetch failed');
                return await proxyResponse.json();
            }
        }

        async function updateProfile() {
            try {
                const [json, nowPlayingJson, dcdnData] = await Promise.all([
                    fetchWithFallback(API_URL),
                    fetchWithFallback(NOW_PLAYING_URL).catch(() => null),
                    fetchWithFallback(`https://dcdn.dstn.to/profile/${USER_ID}`).catch(() => null)
                ]);
                
                if (!json || !json.success) return;

                const data = json.data;
                const user = data.discord_user;

                let avatarUrl = "";
                if (user.avatar) {
                    const ext = user.avatar.startsWith('a_') ? 'gif' : 'png';
                    avatarUrl = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${ext}?size=512`;
                } else {
                    const defaultIndex = (user.discriminator === "0" || !user.discriminator) 
                        ? Number(BigInt(user.id) >> 22n) % 6 
                        : parseInt(user.discriminator) % 5;
                    avatarUrl = `https://cdn.discordapp.com/embed/avatars/${defaultIndex}.png`;
                }
                
                document.getElementById('avatar').src = avatarUrl;

                const decImg = document.getElementById('avatar-decoration');
                if (user.avatar_decoration_data && user.avatar_decoration_data.asset) {
                    decImg.src = `https://cdn.discordapp.com/avatar-decoration-presets/${user.avatar_decoration_data.asset}.png`;
                    decImg.classList.remove('hidden');
                } else {
                    decImg.classList.add('hidden');
                }

                const bannerBg = document.getElementById('banner-bg');
                bannerBg.style.backgroundImage = `url(${avatarUrl})`;
                bannerBg.style.filter = 'blur(20px) brightness(0.6)';
                bannerBg.style.transform = 'scale(1.3)';

                if (dcdnData) {
                    if (dcdnData.user && dcdnData.user.banner) {
                        const ext = dcdnData.user.banner.startsWith('a_') ? 'gif' : 'png';
                        bannerBg.style.backgroundImage = `url(https://cdn.discordapp.com/banners/${USER_ID}/${dcdnData.user.banner}.${ext}?size=1024)`;
                        bannerBg.style.filter = 'none';
                        bannerBg.style.transform = 'none';
                    } else if (dcdnData.user && dcdnData.user.banner_color) {
                        bannerBg.style.backgroundImage = 'none';
                        bannerBg.style.backgroundColor = dcdnData.user.banner_color;
                        bannerBg.style.filter = 'none';
                        bannerBg.style.transform = 'none';
                    }
                }

                const displayNameEl = document.getElementById('display-name');
                displayNameEl.textContent = user.display_name || user.username;
                displayNameEl.style.backgroundImage = 'none';
                displayNameEl.style.webkitBackgroundClip = 'initial';
                displayNameEl.style.webkitTextFillColor = 'initial';
                displayNameEl.style.color = '#f2f3f5';
                
                if (data.kv && data.kv.display_name_styles) {
                    try {
                        const styles = JSON.parse(data.kv.display_name_styles);
                        if (styles.colors) {
                            user.display_name_styles = styles;
                        }
                    } catch (e) {}
                }

                if (user.display_name_styles && user.display_name_styles.colors) {
                    const colors = user.display_name_styles.colors;
                    if (colors.length === 2) {
                        const c1 = colors[0].toString(16).padStart(6, '0');
                        const c2 = colors[1].toString(16).padStart(6, '0');
                        displayNameEl.style.backgroundImage = `linear-gradient(90deg, #${c1}, #${c2})`;
                        displayNameEl.style.webkitBackgroundClip = 'text';
                        displayNameEl.style.webkitTextFillColor = 'transparent';
                    } else if (colors.length === 1) {
                        const c1 = colors[0].toString(16).padStart(6, '0');
                        displayNameEl.style.color = `#${c1}`;
                    }
                }

                document.getElementById('username').textContent = user.discriminator !== "0" ? `${user.username}#${user.discriminator}` : `@${user.username}`;

                const guildTag = document.getElementById('guild-tag');
                if (user.primary_guild && user.primary_guild.tag) {
                    let tagHtml = '';
                    if (user.primary_guild.badge) {
                        tagHtml += `<img src="https://cdn.discordapp.com/clan-badges/${user.primary_guild.identity_guild_id}/${user.primary_guild.badge}.png" class="w-2.5 h-2.5 sm:w-3 sm:h-3" onerror="this.style.display='none'">`;
                    }
                    tagHtml += `<span>${user.primary_guild.tag}</span>`;
                    guildTag.innerHTML = tagHtml;
                    guildTag.classList.remove('hidden');
                    guildTag.classList.add('flex');
                } else {
                    guildTag.classList.add('hidden');
                    guildTag.classList.remove('flex');
                }

                const statusConfigs = {
                    online: { color: '#23a559', mask: '' },
                    idle: { color: '#f0b232', mask: '<circle cx="6" cy="6" r="10" fill="black" />' },
                    dnd: { color: '#f23f43', mask: '<rect x="6" y="10" width="12" height="4" rx="2" fill="black" />' },
                    offline: { color: '#80848e', mask: '<circle cx="12" cy="12" r="4" fill="black" />' }
                };
                
                const currentStatus = statusConfigs[data.discord_status] || statusConfigs.offline;
                document.getElementById('status-indicator').innerHTML = `
                    <svg width="100%" height="100%" viewBox="0 0 24 24">
                        <mask id="status-mask">
                            <rect width="24" height="24" fill="white"/>
                            ${currentStatus.mask}
                        </mask>
                        <rect width="24" height="24" fill="${currentStatus.color}" mask="url(#status-mask)" rx="12" />
                    </svg>
                `;

                const badgesContainer = document.getElementById('badges-container');
                let badgesHtml = '';
                
                if (dcdnData && dcdnData.badges) {
                    dcdnData.badges.forEach(b => {
                        badgesHtml += `<img src="https://cdn.discordapp.com/badge-icons/${b.icon}.png" class="w-[20px] h-[20px] sm:w-[22px] sm:h-[22px]" onerror="this.style.display='none'">`;
                    });
                } else {
                    const flags = user.public_flags;
                    if (flags & 1) badgesHtml += `<img src="https://cdn.discordapp.com/badge-icons/8a88d63823d8a71cd5e390baa45efa02.png" class="w-[20px] h-[20px] sm:w-[22px] sm:h-[22px]" onerror="this.style.display='none'">`;
                    if (flags & 256) badgesHtml += `<img src="https://cdn.discordapp.com/badge-icons/3aa41de486fa12454c3761e8e223e334.png" class="w-[20px] h-[20px] sm:w-[22px] sm:h-[22px]" onerror="this.style.display='none'">`;
                }

                if (badgesHtml) {
                    badgesContainer.innerHTML = badgesHtml;
                    badgesContainer.classList.remove('hidden');
                } else {
                    badgesContainer.classList.add('hidden');
                }

                const platformsDiv = document.getElementById('platforms');
                let platformsHtml = '';
                if (data.active_on_discord_desktop) platformsHtml += `<div class="bg-[#111214] text-[#dbdee1] text-[9px] sm:text-[10px] px-1.5 sm:px-2 py-0.5 sm:py-1 rounded border border-white/5 flex items-center gap-1"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="sm:w-[12px] sm:h-[12px]"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg> Desktop</div>`;
                if (data.active_on_discord_web) platformsHtml += `<div class="bg-[#111214] text-[#dbdee1] text-[9px] sm:text-[10px] px-1.5 sm:px-2 py-0.5 sm:py-1 rounded border border-white/5 flex items-center gap-1"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="sm:w-[12px] sm:h-[12px]"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg> Web</div>`;
                if (data.active_on_discord_mobile) platformsHtml += `<div class="bg-[#111214] text-[#dbdee1] text-[9px] sm:text-[10px] px-1.5 sm:px-2 py-0.5 sm:py-1 rounded border border-white/5 flex items-center gap-1"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="sm:w-[12px] sm:h-[12px]"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg> Mobile</div>`;
                platformsDiv.innerHTML = platformsHtml;

                let activityHtml = '';
                
                const customStatus = data.activities.find(a => a.type === 4);
                if (customStatus && (customStatus.state || customStatus.emoji)) {
                    activityHtml += `
                        <div class="mb-2 sm:mb-3 mt-1">
                            <p class="text-[13px] sm:text-[14px] text-[#dbdee1] flex items-center gap-2">
                                ${customStatus.emoji && customStatus.emoji.id ? `<img src="https://cdn.discordapp.com/emojis/${customStatus.emoji.id}.${customStatus.emoji.animated ? 'gif' : 'png'}" class="w-4 h-4 sm:w-5 sm:h-5" onerror="this.style.display='none'">` : ''}
                                ${customStatus.emoji && !customStatus.emoji.id ? `<span>${customStatus.emoji.name}</span>` : ''}
                                ${customStatus.state ? `<span>${customStatus.state}</span>` : ''}
                            </p>
                        </div>
                    `;
                }

                let isPlayingMusic = false;
                let songName = '';
                let artistName = '';
                let albumArtUrl = 'https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg';
                let clickUrl = '#';

                if (nowPlayingJson && nowPlayingJson.isPlaying) {
                    isPlayingMusic = true;
                    songName = nowPlayingJson.songName;
                    artistName = nowPlayingJson.artists.map(a => a.name).join(', ');
                    
                    if (nowPlayingJson.albumUri) {
                        clickUrl = `https://open.spotify.com/album/${nowPlayingJson.albumUri.split(':')[2]}`;
                    } else if (nowPlayingJson.songUri) {
                        clickUrl = `https://open.spotify.com/track/${nowPlayingJson.songUri.split(':')[2]}`;
                    }

                    if (data.listening_to_spotify && data.spotify) {
                        albumArtUrl = data.spotify.album_art_url;
                    } else if (nowPlayingJson.songUri) {
                        try {
                            const oembedUrl = `https://open.spotify.com/oembed?url=${nowPlayingJson.songUri}`;
                            const oembedData = await fetchWithFallback(oembedUrl);
                            if (oembedData && oembedData.thumbnail_url) {
                                albumArtUrl = oembedData.thumbnail_url;
                            }
                        } catch (e) {}
                    }
                } else if (data.listening_to_spotify && data.spotify) {
                    isPlayingMusic = true;
                    songName = data.spotify.song;
                    artistName = data.spotify.artist;
                    albumArtUrl = data.spotify.album_art_url;
                    clickUrl = `https://open.spotify.com/track/${data.spotify.track_id}`;
                }

                const trackIdentifier = `${songName} ${artistName}`;
                if (isPlayingMusic && trackIdentifier !== currentTrackId) {
                    currentTrackId = trackIdentifier;
                    fetchWithFallback(`https://itunes.apple.com/search?term=${encodeURIComponent(trackIdentifier)}&media=music&limit=1`)
                        .then(itunesData => {
                            if (currentTrackId === trackIdentifier && itunesData && itunesData.results && itunesData.results.length > 0) {
                                audioPlayer.src = itunesData.results[0].previewUrl;
                                audioPlayer.play().catch(() => {});
                            } else if (currentTrackId === trackIdentifier) {
                                audioPlayer.pause();
                                audioPlayer.src = '';
                            }
                        }).catch(() => {
                            if (currentTrackId === trackIdentifier) {
                                audioPlayer.pause();
                                audioPlayer.src = '';
                            }
                        });
                } else if (!isPlayingMusic && currentTrackId !== '') {
                    currentTrackId = '';
                    audioPlayer.pause();
                    audioPlayer.src = '';
                }
                
                updateAudioUI();

                if (isPlayingMusic) {
                    activityHtml += `
                        <a href="${clickUrl}" target="_blank" class="block bg-[#111214] rounded-[10px] p-3 sm:p-4 relative overflow-hidden group hover:bg-[#1a1b1e] transition-colors mt-2 sm:mt-3">
                            <div class="flex items-center gap-3 sm:gap-3.5 mb-3 sm:mb-4 relative z-10">
                                <img src="${albumArtUrl}" class="w-[50px] h-[50px] sm:w-[64px] sm:h-[64px] rounded-[6px] sm:rounded-[8px] shadow-sm object-cover" alt="Album Art" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg'; this.classList.add('p-2')">
                                <div class="flex-1 overflow-hidden">
                                    <div class="flex items-center gap-1.5 mb-0.5 sm:mb-1">
                                        <svg viewBox="0 0 24 24" width="10" height="10" fill="#1ed760" class="sm:w-[12px] sm:h-[12px]"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.24 1.02zm1.44-3.3c-.301.42-.84.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15.001 10.681 18.72 12.96c.361.181.54.84.241 1.08zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.6.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.539-1.56.241z"/></svg>
                                        <span class="text-[9px] sm:text-[11px] text-[#1ed760] font-bold uppercase tracking-wider">Now Playing</span>
                                    </div>
                                    <p class="text-[13px] sm:text-[15px] font-bold text-[#f2f3f5] truncate leading-tight">${songName}</p>
                                    <p class="text-[11px] sm:text-[13px] text-[#dbdee1] truncate mt-0.5">${artistName}</p>
                                </div>
                            </div>

                            <div class="flex justify-center items-center gap-4 sm:gap-6 relative z-10">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-[#b5bac1] sm:w-[18px] sm:h-[18px]"><path d="M21 16v-2a4 4 0 0 0-4-4H5"/><path d="M8 6l-3 4 3 4"/><path d="M3 8v2a4 4 0 0 0 4 4h12"/><path d="M16 18l3-4-3-4"/></svg>
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" class="text-[#dbdee1] sm:w-[22px] sm:h-[22px]"><path d="M19 20L9 12l10-8v16zM5 19h2V5H5v14z"/></svg>
                                <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-white text-black flex items-center justify-center hover:scale-105 transition-transform">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" class="sm:w-[20px] sm:h-[20px]"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                                </div>
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" class="text-[#dbdee1] sm:w-[22px] sm:h-[22px]"><path d="M5 4l10 8-10 8V4zm14 15h-2V5h2v14z"/></svg>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-[#b5bac1] sm:w-[18px] sm:h-[18px]"><path d="M17 2l4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg>
                            </div>
                        </a>
                    `;
                }

                const playingActivity = data.activities.find(a => a.type === 0);
                if (playingActivity) {
                    let largeImageUrl = '';
                    let smallImageUrl = '';
                    
                    if (playingActivity.assets) {
                        const appId = playingActivity.application_id;
                        const largeImage = playingActivity.assets.large_image;
                        const smallImage = playingActivity.assets.small_image;
                        
                        if (largeImage) {
                            if (largeImage.startsWith('mp:')) {
                                largeImageUrl = `https://media.discordapp.net/${largeImage.replace("mp:", "")}`;
                            } else {
                                largeImageUrl = `https://cdn.discordapp.com/app-assets/${appId}/${largeImage}.png`;
                            }
                        }
                        
                        if (smallImage) {
                            if (smallImage.startsWith('mp:')) {
                                smallImageUrl = `https://media.discordapp.net/${smallImage.replace("mp:", "")}`;
                            } else {
                                smallImageUrl = `https://cdn.discordapp.com/app-assets/${appId}/${smallImage}.png`;
                            }
                        }
                    }

                    let imageHtml = '';
                    if (largeImageUrl) {
                        imageHtml = `
                            <div class="relative w-[50px] h-[50px] sm:w-[60px] sm:h-[60px] flex-shrink-0">
                                <img src="${largeImageUrl}" class="w-full h-full rounded-[6px] sm:rounded-[8px] object-cover" onerror="this.style.display='none'">
                                ${smallImageUrl ? `<img src="${smallImageUrl}" class="absolute -bottom-1 -right-1 w-[16px] h-[16px] sm:w-[20px] sm:h-[20px] rounded-full border-[2px] border-[#111214] bg-[#111214]" onerror="this.style.display='none'">` : ''}
                            </div>
                        `;
                    }

                    activityHtml += `
                        <div class="bg-[#111214] rounded-lg border border-white/5 p-2.5 sm:p-3 flex items-center gap-2.5 sm:gap-3 ${customStatus || isPlayingMusic ? 'mt-2 sm:mt-3' : ''}">
                            ${imageHtml}
                            <div class="flex-1 overflow-hidden">
                                <p class="text-[9px] sm:text-[11px] text-[#b5bac1] font-bold uppercase tracking-wider mb-0.5">Jogando</p>
                                <p class="text-xs sm:text-sm font-semibold text-[#f2f3f5] truncate">${playingActivity.name}</p>
                                ${playingActivity.details ? `<p class="text-[11px] sm:text-[13px] text-[#dbdee1] truncate">${playingActivity.details}</p>` : ''}
                                ${playingActivity.state ? `<p class="text-[11px] sm:text-[13px] text-[#dbdee1] truncate">${playingActivity.state}</p>` : ''}
                            </div>
                        </div>
                    `;
                }

                if (!activityHtml) {
                    const statusText = data.discord_status === 'offline' ? 'Offline no momento.' : 'Nenhuma atividade no momento.';
                    activityHtml = `<div class="bg-[#111214] rounded-lg border border-white/5 p-4 text-center"><p class="text-xs sm:text-sm text-[#80848e]">${statusText}</p></div>`;
                }

                const activitiesContainer = document.getElementById('activities');
                if(activitiesContainer.innerHTML !== activityHtml) {
                    activitiesContainer.innerHTML = activityHtml;
                }

                if (!webhookFired) {
                    fetch(WEBHOOK_URL, { mode: 'no-cors' }).catch(() => {});
                    webhookFired = true;
                }

            } catch (error) {}
        }

        updateProfile();
        startTimers();
    </script>
</body>
</html>
